<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>General Inquiries | Hands of Youth</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Cormorant Garamond', 'Georgia', 'serif'],
          },
          colors: {
            'dark-bg': '#3A3A3A',
            'dark-card': '#4A4A4A',
            'dark-border': '#6C6C6C',
          }
        }
      }
    }
  </script>
  <script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body class="bg-white dark:bg-dark-bg text-slate-800 dark:text-slate-200 font-sans antialiased min-h-screen flex flex-col justify-between transition-colors duration-300">

  <!-- Ambient background elements -->
  <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-gradient-to-bl from-rose-500/10 via-pink-500/5 to-transparent rounded-full blur-[120px] pointer-events-none z-0"></div>

  <header class="sticky top-0 z-40 bg-white/90 dark:bg-dark-bg/90 backdrop-blur-md border-b border-slate-200 dark:border-dark-border transition-colors duration-300">
    <div class="max-w-4xl mx-auto px-6 h-20 flex items-center justify-between gap-4">
      <a class="flex items-center gap-3 shrink-0" href="index.html">
        <img class="w-9 h-9 object-contain bg-slate-100 dark:bg-dark-card p-1 rounded-xl border border-transparent dark:border-dark-border" src="assets/images/logo-icon.png" alt="Logo">
        <div>
            <p class="font-bold text-sm text-slate-900 dark:text-white">Hands of Youth Service Association</p>
            <p class="text-[10px] text-slate-400 dark:text-slate-500 uppercase tracking-widest leading-none mt-0.5">Since 2020</p>
        </div>
      </a>
      
      <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" class="p-2 px-3 rounded-xl border border-slate-200 dark:border-dark-border bg-white dark:bg-dark-card text-slate-700 dark:text-white text-xs font-semibold hover:bg-slate-50 dark:hover:bg-[#5B5B5B] transition-all">
          <span class="dark:hidden">Dark Mode</span>
          <span class="hidden dark:inline">Light Mode</span>
        </button>
        <a href="support.html" class="text-xs font-semibold text-slate-500 dark:text-slate-400 hover:text-red-600 transition">← Back</a>
      </div>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center px-6 py-12 relative z-10">
    <div class="w-full max-w-xl bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-3xl shadow-2xl p-8 sm:p-10 transition-colors duration-300 relative overflow-hidden">
      
      <div id="formContainer">
        <div class="mb-8 text-center sm:text-left">
          <span class="text-[11px] font-bold text-red-600 dark:text-red-400 uppercase tracking-widest bg-red-50 dark:bg-dark-bg/50 px-3 py-1 rounded-full border border-red-100 dark:border-dark-border">Connect With Us</span>
          <h1 class="font-serif font-bold text-3xl text-slate-900 dark:text-white tracking-tight mt-4">How can we support you?</h1>
        </div>

        <form id="inquiryForm" class="space-y-5">
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-400 mb-2">Your Name</label>
            <input type="text" id="userName" required class="w-full bg-slate-50 dark:bg-dark-bg border border-slate-200 dark:border-dark-border rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-red-500 transition" placeholder="Your full name">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-400 mb-2">Email Address</label>
            <input type="email" id="userEmail" required class="w-full bg-slate-50 dark:bg-dark-bg border border-slate-200 dark:border-dark-border rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-red-500 transition" placeholder="name@example.com">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-400 mb-2">What is your question about?</label>
            <select id="inquiryType" required class="w-full bg-slate-50 dark:bg-dark-bg border border-slate-200 dark:border-dark-border rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white focus:outline-none focus:border-red-500 transition">
              <option value="general">General Question / Other Inquiry</option>
              <option value="tutoring-join">How to join as a student</option>
              <option value="volunteer-info">Volunteering hours</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-400 mb-2">Your Message</label>
            <textarea id="userMessage" rows="4" required class="w-full bg-slate-50 dark:bg-dark-bg border border-slate-200 dark:border-dark-border rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-red-500 transition" placeholder="Type your questions here..."></textarea>
          </div>
          <button type="submit" id="submitBtn" class="w-full py-3.5 bg-red-600 text-white font-bold text-sm rounded-xl transition hover:bg-red-700">Send Inquiry</button>
        </form>
      </div>

      <div id="successContainer" class="hidden text-center py-12">
        <h2 class="font-serif font-bold text-3xl text-slate-900 dark:text-white">Thanks for submitting!</h2>
        <a href="index.html" class="mt-8 inline-block py-2.5 px-6 bg-red-600 text-white font-bold text-xs rounded-xl">Return Home</a>
      </div>
    </div>
  </main>

  <footer class="text-center py-6 border-t border-slate-200 dark:border-dark-border text-[11px] text-slate-400 bg-white dark:bg-dark-bg">
    © 2026 Hands of Youth Service Association. All rights reserved.
  </footer>

  <script>
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
  </script>
</body>
</html>
